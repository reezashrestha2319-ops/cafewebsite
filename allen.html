<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Layout Task</title>

<style>


@media (min-width:600px) and (max-width:900px){
body{
background:red;
}
}


.container{
display:grid;
grid-template-columns: 1fr 1fr 1fr; 
gap:20px;
padding:20px;
}

.box{
background:#ddd;
padding:20px;
text-align:center;
border:1px solid #aaa;
}


@media (max-width:900px){
.container{
grid-template-columns:1fr 1fr;
}
}


@media (max-width:600px){
.container{
grid-template-columns:1fr;
}
}


.sidebar{
background:#cfc;
padding:20px;
}
@media(max-width:900px){
.sidebar{
display:none;
}
}


.footer{
display:flex;
background:#eef;
padding:20px;
gap:20px;
}
.footer div{
flex:1;
background:#dde;
padding:15px;
text-align:center;
}
@media(max-width:650px){
.footer{
flex-direction:column;
}
}


.logo{
text-align:left;
font-size:24px;
font-weight:bold;
}
@media(max-width:600px){
.logo{
text-align:center;
}
}


.banner{
background:#ffe6cc;
padding:20px;
}
.banner-text{
text-align:left;
}
@media(max-width:700px){
.banner-text{
text-align:center;
}
}

</style>
</head>

<body>

<h2 class="logo">My Logo</h2>

<div class="banner">
<p class="banner-text">This is banner text</p>
</div>

<h2>column</h2>
<div class="container">
<div class="box">Column 1</div>
<div class="box">Column 2</div>
<div class="box">Column 3</div>
</div>

<h2>Sidebar Example</h2>
<div class="sidebar">Sidebar </div>

<h2>Footer Example</h2>
<div class="footer">
<div>Footer 1</div>
<div>Footer 2</div>
<div>Footer 3</div>
</div>

</body>
</html>
